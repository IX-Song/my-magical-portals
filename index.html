<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Magic Portal</title>
    <style>
      /* Background */
      body {
        margin:0;
        height:100vh;
        background-image: url('stone.jpg');
        background-size: cover;
        background-position: center;
        color: white;
        text-align:center;
        font-family: sans-serif;
        overflow: hidden;
      }

      /* Portal title glow */
      #title {
        margin-top: 50px;
        font-size: 3em;
        color: white;
        text-shadow: 0 0 10px rgba(255,150,200,0.8);
        animation: glow 12s ease-in-out infinite;
        transition: transform 0.7s ease;
      }

      #title:hover {
        transform: scale(1.1);
      }

      @keyframes glow {
        0% { text-shadow: 0 0 5px rgba(255,150,200,0.4); }
        50% { text-shadow: 0 0 20px rgba(255,150,200,1); }
        100% { text-shadow: 0 0 5px rgba(255,150,200,0.4); }
      }

      /* Magic button */
      #magicBtn {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        cursor: pointer;
        color: gold;
        background-color: black;
        box-shadow: 0 0 10px gold;
        position: relative;
        overflow: visible;
        transition: transform 0.2s;
        margin-top: 50px;
      }

      #magicBtn.clicked {
        transform: scale(1.2);
        animation: glowBtn 0.5s ease-in-out;
      }

      #magicBtn::after {
        content: "✨✨✨";
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%) scale(0);
        color: gold;
        font-size: 20px;
        opacity: 0;
        pointer-events: none;
      }

      #magicBtn.clicked::after {
        animation: spark 5.5s linear forwards;
      }

      @keyframes glowBtn {
        0% { box-shadow: 0 0 10px gold; }
        50% { box-shadow: 0 0 25px gold, 0 0 40px orange; }
        100% { box-shadow: 0 0 10px gold; }
      }

      @keyframes spark {
        0% {
          opacity: 1;
          transform: translateX(-50%) translateY(0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateX(-50%) translateY(-200px) scale(2);
        }
      }

      /* Mouse trail sparkles */
      .sparkle {
        position: fixed;
        pointer-events: none;
        font-size: 20px;
        color: gold;
        opacity: 1;
        transition: transform 2s linear, opacity 2s linear;
      }
    </style>
  </head>
  <body>
    <h1 id="title">✨ Lightlanguage Portal ✨</h1>
    <button id="magicBtn">Click me!</button>
    <p id="msg"></p>

    <script>
      // Button sparkle
      const magicBtn = document.getElementById("magicBtn");
      magicBtn.addEventListener("click", () => {
        magicBtn.classList.add("clicked");
        setTimeout(() => magicBtn.classList.remove("clicked"), 1000);
      });

      // Mouse trail sparkles
      let lastSparkle = 0;
      document.addEventListener("mousemove", (e) => {
        const now = Date.now();
        if (now - lastSparkle < 150) return; // cooldown
        lastSparkle = now;
        if (Math.random() < 0.3) return;

        const sparkle = document.createElement("div");
        sparkle.textContent = "✨";
        sparkle.className = "sparkle";

        const offsetX = (Math.random() - 0.5) * 30;
        const offsetY = (Math.random() - 0.5) * 30;
        sparkle.style.left = e.clientX + offsetX + "px";
        sparkle.style.top = e.clientY + offsetY + "px";
        const size = 12 + Math.random() * 12;
        sparkle.style.fontSize = size + "px";
        sparkle.style.color = "gold";

        document.body.appendChild(sparkle);

        setTimeout(() => {
          const moveX = (Math.random() - 0.5) * 100;
          const moveY = -50 - Math.random() * 150;
          const scale = 1 + Math.random();
          sparkle.style.transform = `translate(${moveX}px, ${moveY}px) scale(${scale})`;
          sparkle.style.opacity = 0;
        }, 0);

        setTimeout(() => sparkle.remove(), 2000 + Math.random() * 1000);
      });
    </script>
  </body>
</html>
