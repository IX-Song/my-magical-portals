<!DOCTYPE html>
<html>
  <body style="
    text-align:center; 
    font-family:sans-serif; 
    margin-top:50px;
    margin:0;
    height:100vh;
    background-image: url('stone.jpg');
    background-size: cover;
    background-position: center;
    color: white;
    text-align:center;
    ">
    <div style="
  height:100%;
  background: rgba(0,0,0,0.3);
  color: white;
  text-align:center;
  padding-top:50px;
">
   <h1 style="text-shadow: 0 0 10px rgba(255, 150, 200, 0.8);" id="title">Hello, GitHub 👋</h1>
<style>
  #title {
    color: white;
    text-shadow: 0 0 10px rgba(255,150,200,0.8);
    animation: glow 3s ease-in-out infinite;
    transition: transform 0.3s ease;
  }
#title:hover {
    transform: scale(1.2);
}
  @keyframes glow {
    0% { text-shadow: 0 0 5px rgba(255,150,200,0.4); }
    50% { text-shadow: 0 0 20px rgba(255,150,200,1); }
    100% { text-shadow: 0 0 5px rgba(255,150,200,0.4); }
  }
</style>
      <button onclick="changeText()">Click me</button>
    </div>
<script>
  function changeText() {
    document.getElementById("title").innerText = "✨ Something shifted ✨";
  }
    </script>
  </body>
</html>
